services:
  - type: web
    name: vercetest
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    region: oregon
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Vercetest
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://vercetest.onrender.com
      - key: APP_KEY
        value: base64:GENERATE_WITH_php_artisan_key_generate_--show
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: dpg-d6k3puggjchc73buejt0-a.onrender.com
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: vercetest_db
      - key: DB_USERNAME
        value: vercetest_user
      - key: DB_PASSWORD
        value: CyCmLxWjsoCVCeWEiUr8hWISycxodLYc
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
